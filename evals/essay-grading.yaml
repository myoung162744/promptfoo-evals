# Essay grading specific assertions
# Combines score accuracy checks with reasoning quality evaluation

# Check if overall score matches human score within ±1 point tolerance
- type: javascript
  value: |
    const modelScore = parseInt(output.match(/Overall Score:\s*(\d+)/)?.[1] || 0);
    const humanScore = context.vars.human_score;
    const diff = Math.abs(modelScore - humanScore);

    if (diff === 0) return { pass: true, score: 1.0, reason: `Perfect match: ${modelScore} = ${humanScore}` };
    if (diff === 1) return { pass: true, score: 0.8, reason: `Close match: ${modelScore} vs ${humanScore} (±1)` };
    return { pass: false, score: 0, reason: `Score mismatch: ${modelScore} vs ${humanScore} (diff: ${diff})` };

# Check if Content score is reasonable (within ±1 of human score)
- type: javascript
  value: |
    const modelScore = parseInt(output.match(/Content:\s*(\d+)/)?.[1] || 0);
    const humanScore = context.vars.human_content_score;
    const diff = Math.abs(modelScore - humanScore);
    return diff <= 1 ? { pass: true, score: 1.0, reason: `Content score within range: ${modelScore} vs ${humanScore}` } : { pass: false, score: 0, reason: `Content score off: ${modelScore} vs ${humanScore}` };

