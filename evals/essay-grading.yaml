# LLM judge evaluates the quality of reasoning and feedback
- type: llm-rubric
  value: |
    The grader provided clear justification tied to specific rubric criteria for each dimension.
    The feedback cites specific evidence from the student essay to support each score.
    The scores are internally consistent (e.g., high content but appropriate organization).
    The constructive feedback is actionable and would help the student improve.
    The overall assessment is fair and defensible based on the reasoning given.
  provider: openai:gpt-4o

# Verify all required sections are present
- type: javascript
  value: |
    const hasContent = /Content:\s*\d+/.test(output);
    const hasOrganization = /Organization:\s*\d+/.test(output);
    const hasWordChoice = /Word Choice:\s*\d+/.test(output);
    const hasConventions = /Conventions:\s*\d+/.test(output);
    const hasOverallScore = /Overall Score:\s*\d+/.test(output);
    const hasFeedback = /Feedback:/.test(output);

    const allPresent = hasContent && hasOrganization && hasWordChoice && hasConventions && hasOverallScore && hasFeedback;

    if (allPresent) return { pass: true, score: 1.0, reason: 'All required sections present' };

    const missing = [];
    if (!hasContent) missing.push('Content');
    if (!hasOrganization) missing.push('Organization');
    if (!hasWordChoice) missing.push('Word Choice');
    if (!hasConventions) missing.push('Conventions');
    if (!hasOverallScore) missing.push('Overall Score');
    if (!hasFeedback) missing.push('Feedback');

    return { pass: false, score: 0, reason: `Missing sections: ${missing.join(', ')}` };
