# ASAP++ — essays with trait-level human scores (sets 1 & 2: persuasive).
# Traits: content, organization, word_choice, sentence_fluency, conventions.
# Run:    npx promptfoo eval -c configs/asap-essays.yaml -o output/asap-essays.json
# Then:   .venv/bin/python scripts/analyze.py output/asap-essays.json
description: "ASAP++ essay grading (trait scores)"

prompts:
  - file://../prompts/essay_grader.txt

# Keep this provider list in sync across all four configs in this directory.
providers:
  - id: anthropic:messages:claude-opus-4-8
    config: { temperature: 0, max_tokens: 2048 }
  - id: anthropic:messages:claude-sonnet-4-6
    config: { temperature: 0, max_tokens: 2048 }
  - id: anthropic:messages:claude-haiku-4-5-20251001
    config: { temperature: 0, max_tokens: 2048 }
  # OpenAI disabled 2026-06-12: API key returned 429 billing_not_active.
  # Re-enable once billing is active on the OpenAI account.
  # - id: openai:gpt-5.1        # reasoning model: temperature unsupported, omitted
  # - id: openai:gpt-5.1-mini
  # Gemini 3 Pro disabled 2026-06-12: Google key is free-tier (limit 0 for
  # gemini-3-pro). Re-enable once a paid Google AI Studio tier is active.
  # - id: google:gemini-3-pro-preview
  #   config: { temperature: 0 }
  - id: google:gemini-2.5-flash
    config: { temperature: 0 }

defaultTest:
  assert:
    - type: javascript
      value: file://../evals/valid_json.js
      metric: valid_json
    - type: javascript
      value: file://../evals/exact_match.js
      metric: exact_match
    - type: javascript
      value: file://../evals/adjacent_match.js
      metric: adjacent_match
    - type: javascript
      value: file://../evals/traits_adjacent.js
      metric: traits_adjacent

tests:
  - file://../test-inputs/generated/asap-pp.yaml
