# Essay Grading Evaluation Configuration
# Evaluates how well models grade essays according to a rubric

# =============================================================================
# PROVIDERS - Compare multiple models
# =============================================================================
providers:
  # Multiple providers for comparing essay grading performance
  - openai:gpt-5
  - gemini:gemini-3-pro-preview
  - anthropic:messages:claude-sonnet-4-5
  # Add your API keys in environment variables or .env file

# =============================================================================
# PROMPTS
# =============================================================================
prompts:
  - file://prompts/essay_grader.txt

# =============================================================================
# TEST CASES
# =============================================================================
tests:
  # Essay grading test cases (5 sample essays)
  - file://test-inputs/essays.yaml

# =============================================================================
# DEFAULT TEST OPTIONS & ASSERTIONS
# =============================================================================
defaultTest:
  options:
    temperature: 0.7
    max_tokens: 1000
  assert:
    # Essay grading specific evaluations
    - file://evals/essay-grading.yaml
