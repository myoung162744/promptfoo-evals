# Cheap pipeline smoke test: 5 synthetic essays, 2 budget models.
# Verifies the JSON grader prompt + assertions end-to-end for pennies.
#   npx promptfoo eval -o output/synthetic.json
# The real evals live in configs/ (one per dataset) — see README-evals.md.
description: "Synthetic smoke test (5 essays, cheap models)"

prompts:
  - file://prompts/essay_grader.txt

providers:
  - id: anthropic:messages:claude-haiku-4-5-20251001
    config: { temperature: 0, max_tokens: 2048 }
  - id: google:gemini-2.5-flash
    config: { temperature: 0 }

defaultTest:
  assert:
    - type: javascript
      value: file://evals/valid_json.js
      metric: valid_json
    - type: javascript
      value: file://evals/exact_match.js
      metric: exact_match
    - type: javascript
      value: file://evals/adjacent_match.js
      metric: adjacent_match
    - type: javascript
      value: file://evals/traits_adjacent.js
      metric: traits_adjacent

tests:
  - file://test-inputs/essays.yaml
